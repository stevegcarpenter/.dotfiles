# use UTF8
# set -g utf8
# set-window-option -g utf8 on

# make tmux display things in 256 colors
set -g default-terminal "tmux-256color"

# change the bind key
set -g prefix C-q
unbind q
bind q send-prefix

set -g history-limit 50000

# tmux messages are displayed for 4 seconds
set -g display-time 4000

# reload ~/.tmux.conf using PREFIX r
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# change window splitting bindings
unbind %
bind | split-window -h
unbind '"'
bind - split-window -v

# Enable extended key reporting for Claude Code
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'


# mouse support
set -g mouse on

# hjkl pane traversal
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind C-h resize-pane -L 4
bind C-j resize-pane -D 2
bind C-k resize-pane -U 2
bind C-l resize-pane -R 4

# emacs key bindings in tmux command prompt (prefix + :) are better than
# vi keys, even for vim users
set -g status-keys emacs

# set default shell to zsh
set-option -g default-shell /bin/zsh

# do not allow tmux to automatically rename windows
set-option -g allow-rename off

# sync all panes
bind y set synchronize-panes\; display 'synchronize-panes #{?synchronize-panes,on,off}'

# Save/restore session with tmux-continuum
set -g @continuum-restore 'on'

# Plugin dir (used by the custom status modules below)
set-environment -gF TMUX_PLUGIN_MANAGER_PATH '#{HOME}/.tmux/plugins/'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'dreknix/tmux-primary-ip'
set -g @plugin 'catppuccin/tmux#v2.1.3'

#### COLOUR (Catppuccin)
# Status line based on dreknix's config:
# https://github.com/catppuccin/tmux/discussions/317#discussioncomment-10890888
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_status 'no'
# show the window name (#W, set via prefix+,) instead of the default
# pane title (#T, which the shell keeps overwriting)
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_fill 'number'
set -g @catppuccin_window_current_text ' #W'
set -g @catppuccin_window_current_color '#{E:@thm_surface_2}'
set -g @catppuccin_date_time_text ' %d.%m. %H:%M'
set -g @catppuccin_status_module_text_bg '#{E:@thm_mantle}'

# Load catppuccin now (before the status-right lines below); tpm still
# manages installs/updates via the @plugin line above
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# load custom status modules (colored CPU / memory / primary IP)
source -F '#{HOME}/.dotfiles/tmux/custom_modules/ctp_cpu.conf'
source -F '#{HOME}/.dotfiles/tmux/custom_modules/ctp_memory.conf'
source -F '#{HOME}/.dotfiles/tmux/custom_modules/primary_ip.conf'

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# pane border
set-option -g pane-border-status top
set-option -g pane-border-format " #{pane_current_path} "

# status bar (explicit position: sourcing the config can't unset a
# previously-set option, so state it rather than rely on the default)
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100
set -g status-left '#{E:@catppuccin_status_session} '
set -gF status-right '#{E:@catppuccin_status_primary_ip}'
set -agF status-right '#{E:@catppuccin_status_ctp_cpu}'
set -agF status-right '#{E:@catppuccin_status_ctp_memory}'
# battery module only on machines that have one (macOS check)
if 'pmset -g batt 2>/dev/null | grep -q InternalBattery' {
  set -agF status-right '#{E:@catppuccin_status_battery}'
}
set -ag status-right '#{E:@catppuccin_status_date_time}'

##############################################################################
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
